version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-vidio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_vidio
    ports:
      - "5432:5432"
    volumes:
      - ai_vidio_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_vidio"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-vidio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ai_vidio_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ai_vidio_postgres:
  ai_vidio_redis:
