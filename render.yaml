services:
  - name: ai-vidio-api
    type: web
    runtime: node
    rootDir: .
    plan: starter
    autoDeployTrigger: commit
    healthCheckPath: /health
    buildCommand: npm install && npm run prisma:generate && npm run build:api
    preDeployCommand: npm --workspace @ai-vidio/api run db:push
    startCommand: npm --workspace @ai-vidio/api run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-vidio-db
          property: connectionString
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        value: ""
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_WEB_BASE_URL
        value: https://ai-vidio-web.vercel.app
      - key: CORS_ORIGIN
        value: https://ai-vidio-web.vercel.app,https://ai-vidio-admin.vercel.app,http://localhost:3000,http://localhost:3002
      - key: APP_BASE_URL
        sync: false
      - key: WEB_BASE_URL
        value: https://ai-vidio-web.vercel.app
      - key: MOCK_SOCIAL_OAUTH
        value: "false"
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_IMAGE_MODEL
        value: gemini-2.5-flash-image
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-5.4
      - key: CHAT_ASSISTANT_MODEL
        value: gpt-5.4
      - key: CHAT_ASSISTANT_TONE
        value: friendly
      - key: CHAT_CONTEXT_WINDOW
        value: "8"
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: FB_APP_ID
        sync: false
      - key: FB_APP_SECRET
        sync: false
      - key: FB_REDIRECT_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_DM_ACCESS_TOKEN
        sync: false

databases:
  - name: ai-vidio-db
    plan: basic-256mb
    databaseName: ai_vidio
    user: ai_vidio
    postgresMajorVersion: "17"
